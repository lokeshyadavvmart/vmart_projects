services:
  # -----------------------------
  # ClickHouse Service
  # -----------------------------
  clickhouse:
    build:
      context: ./docker/clickhouse
    container_name: clickhouse
    ports:
      - "8123:8123" # HTTP
      - "9000:9000" # Native client
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    restart: unless-stopped

  # -----------------------------
  # All-in-One App Service (Backend + ETL + Frontend)
  # -----------------------------
  app:
    build:
      context: .
    container_name: data_governance_mvp
    ports:
      - "3000:3000" # Frontend
      - "8000:8000" # Backend
    depends_on:
      - clickhouse
    restart: unless-stopped

# -----------------------------
# Persistent Volumes
# -----------------------------
volumes:
  clickhouse_data:
